# /etc/nginx/ploi/pimcore.infivea.com/server/disable-basic-auth-well-known.conf
#
# Allows ACME (Certbot/Let's Encrypt) HTTP-01 challenges through any basic-auth
# protection. Included automatically because the main vhost has
# `include /etc/nginx/ploi/pimcore.infivea.com/server/*;`.
#
# If you don't use HTTP basic auth on this site, this file is harmless — keep it
# so cert renewals always work.

location /.well-known/acme-challenge/ {
    allow all;
    auth_basic off;
    default_type "text/plain";
}
