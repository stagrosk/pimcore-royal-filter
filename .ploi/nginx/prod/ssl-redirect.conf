# /etc/nginx/ssl/pimcore.infivea.com
#
# Ploi-style SSL redirect bundle. Included from /etc/nginx/sites-available/pimcore.infivea.com
# via `include /etc/nginx/ssl/pimcore.infivea.com;`.
# Provides:
#   1. HTTP (:80) → HTTPS redirect for the apex AND every subdomain (`.pimcore.infivea.com`)
#   2. HTTPS www → non-www redirect

# Redirect every request to HTTPS...
server {
     listen 80;
     listen [::]:80;
     server_name .pimcore.infivea.com;
     return 301 https://$host$request_uri;
}

# Redirect SSL to primary domain SSL...
server {
     listen 443 ssl http2;
     listen [::]:443 ssl http2;
     ssl_certificate /etc/letsencrypt/live/pimcore.infivea.com/fullchain.pem;
     ssl_certificate_key /etc/letsencrypt/live/pimcore.infivea.com/privkey.pem;

     server_name www.pimcore.infivea.com;
     return 301 https://pimcore.infivea.com$request_uri;
}
