# /etc/nginx/ploi/pim-staging.infivea.com/server/disable-basic-auth-well-known.conf
#
# Allows ACME (Certbot/Let's Encrypt) HTTP-01 challenges through any basic-auth
# protection. Included automatically because the main vhost has
# `include /etc/nginx/ploi/pim-staging.infivea.com/server/*;`.

location /.well-known/acme-challenge/ {
    allow all;
    auth_basic off;
    default_type "text/plain";
}
