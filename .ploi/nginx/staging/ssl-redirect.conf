# /etc/nginx/ssl/pim-staging.infivea.com
#
# Drop in AFTER Ploi has issued the LE cert. Pairs with `pim-staging.infivea.com.ssl`.
# Provides:
#   1. HTTP (:80) → HTTPS redirect for the apex AND every subdomain
#   2. HTTPS www → non-www redirect

# Redirect every request to HTTPS...
server {
     listen 80;
     listen [::]:80;
     server_name .pim-staging.infivea.com;
     return 301 https://$host$request_uri;
}

# Redirect SSL to primary domain SSL...
server {
     listen 443 ssl http2;
     listen [::]:443 ssl http2;
     ssl_certificate /etc/letsencrypt/live/pim-staging.infivea.com/fullchain.pem;
     ssl_certificate_key /etc/letsencrypt/live/pim-staging.infivea.com/privkey.pem;

     server_name www.pim-staging.infivea.com;
     return 301 https://pim-staging.infivea.com$request_uri;
}
