imports:
    - { resource: 'local/' }

opendxp_deepl:
    deepl_auth_key: '%env(DEEPL_AUTH_KEY)%'

opendxp_translation:
    api_key: '%env(DEEPL_AUTH_KEY)%'
    source_lang: de
    provider:  deepl #or deepl_free
    formality: "default"

