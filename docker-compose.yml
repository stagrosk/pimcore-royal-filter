version: '3.4'
services:

    infivea-adminer:
        image: adminer:latest
        container_name: infivea-adminer
        ports:
            - 8750:8080
        labels:
            - traefik.docker.network=traefik
            - traefik.frontend.rule=Host:infivea-adminer.local-127-0-0-1.nip.io
            - traefik.enable=true
            - traefik.port=8080
        depends_on:
            - infivea-db
        networks:
            - stagro
            - traefik
        env_file:
            - .env.docker

    infivea-elasticsearch:
        image: elasticsearch:8.7.0
        container_name: infivea-elasticsearch
        volumes:
            - esdata01:/usr/share/elasticsearch/data
        ports:
            - '9270:9200'
            - '9370:9300'
        mem_limit: '2147483648'
        environment:
            - discovery.type=single-node
        networks:
            - stagro
            - traefik
        env_file:
            - .env.docker

    infivea-rabbitmq:
        image: rabbitmq:3-management-alpine
        container_name: infivea-rabbitmq
        volumes:
            - ./var/rabbitmq/data/:/var/lib/rabbitmq
        ports:
            - '5670:5672'
            - '15670:15672'
        labels:
            - traefik.docker.network=traefik
            - traefik.frontend.rule=Host:infivea-rabbitmq.local-127-0-0-1.nip.io
            - traefik.frontend.passHostHeader=true
            - traefik.enable=true
            - traefik.port=15672
        networks:
            - stagro
            - traefik
        env_file:
            - .env.docker

    infivea-redis:
        image: redis:6.0-alpine
        container_name: infivea-redis
        ports:
            - "8970:6379"
        networks:
            - stagro
            - traefik
        env_file:
            - .env.docker

    infivea-db:
        image: mysql:8.0.32
        container_name: infivea-mysql
        working_dir: /application
        command: mysqld --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
        volumes:
            - ./:/var/www/html
            - ./var/mysql-data:/var/lib/mysql
            - ./.docker/mysql/init-scripts/:/docker-entrypoint-initdb.d
        ports:
            - "25070:3306"
        networks:
            - stagro
            - traefik
        env_file:
            - .env.docker

    infivea-webserver:
        image: nginx:1-alpine
        container_name: infivea-webserver
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html:cached
            - ./var/nginx-log/:/var/logs/nginx
            - ./.docker/nginx.conf:/etc/nginx/conf.d/default.conf
        ports:
            - "8070:80"
        labels:
            - traefik.docker.network=traefik
            - traefik.frontend.rule=Host:infivea.local-127-0-0-1.nip.io
            - traefik.frontend.passHostHeader=true
            - traefik.enable=true
            - traefik.port=80
        depends_on:
            - infivea-php
        networks:
            - stagro
            - traefik
        env_file:
            - .env.docker

    infivea-webserver-debug:
        image: nginx:1-alpine
        container_name: infivea-webserver-debug
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html:cached
            - ./var/nginx-log/:/var/logs/nginx
            - ./.docker/nginx.conf:/etc/nginx/conf.d/default.conf
        ports:
            - "8071:80"
        labels:
            - traefik.docker.network=traefik
            - traefik.frontend.rule=Host:infivea-debug.local-127-0-0-1.nip.io
            - traefik.frontend.passHostHeader=true
            - traefik.enable=true
            - traefik.port=80
        depends_on:
            - infivea-php-debug
        networks:
            - traefik
        env_file:
            - .env.docker

    infivea-php:
        build:
            context: .
            dockerfile: .docker/php/Dockerfile
        image: infivea-php:latest
        container_name: infivea-php
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html:cached
        ports:
            - "35071:9000"
        depends_on:
            - infivea-db
            - infivea-redis
        networks:
            - stagro
            - traefik
        environment:
            - PHP_IDE_CONFIG="serverName=localhost"

    infivea-php-debug:
        build:
            context: .
            dockerfile: .docker/php/Dockerfile
        image: infivea-php-debug:latest
        container_name: infivea-php-debug
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html:cached
        ports:
            - "35072:9000"
        depends_on:
            - infivea-db
            - infivea-redis
        networks:
            - stagro
            - traefik
        environment:
            - PHP_IDE_CONFIG="serverName=localhost"
        env_file:
            - .env.docker

    infivea-mailhog:
        container_name: infivea-mailhog
        image: mailhog/mailhog
        environment:
            - MH_STORAGE=maildir
        volumes:
            - ./var/mailhog/maildir:/maildir:rw,delegated
        ports:
            - "1170:1025"
            - "8170:8025"
        depends_on:
            - infivea-webserver
            - infivea-webserver-debug
        labels:
            - traefik.docker.network=traefik
            - traefik.frontend.rule=Host:infivea-mailhog.local-127-0-0-1.nip.io
            - traefik.enable=true
            - traefik.port=8025
        networks:
            - stagro
            - traefik

    infivea-supervisord:
        #user: '1000:1000' # set to your uid:gid
        image: opendxp/opendxp:php8.3-supervisord-latest
        depends_on:
            - infivea-db
        volumes:
            - .:/var/www/html:cached
            - ./.docker/supervisord.conf:/etc/supervisor/conf.d/opendxp.conf:ro
        networks:
            - stagro
            - traefik

networks:
    stagro:
        internal: true
    traefik:
        external: true

volumes:
    esdata01:
        driver: local
