services:
    _defaults:
        public: false
        autowire: true
        autoconfigure: true

    OpendxpVendureBridgeBundle\:
        resource: '../../../*'
        # EventListeners excluded — AMQP path is unused (no consumer) and the
        # subscriber's Pimcore-era event names (pimcore.dataobject.postUpdate/Delete)
        # do not fire in OpenDXP. Direct webhooks go via App\EventSubscriber\AbstractWebhookSubscriber.
        exclude: '../../../{DependencyInjection,EventListeners}'

    OpendxpVendureBridgeBundle\Security\CheckConsumerPermissionsService:
        arguments:
            - '%env(PIMCORE_API_KEY)%'
